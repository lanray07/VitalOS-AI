name: iOS Xcode

on:
  push:
    branches:
      - main
    paths:
      - "VitalOSAI/**"
      - "VitalOSAI.xcodeproj/**"
      - ".github/workflows/ios-xcode.yml"
  workflow_dispatch:
    inputs:
      upload_to_testflight:
        description: "Upload exported IPA to TestFlight"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

concurrency:
  group: ios-xcode-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PROJECT_PATH: VitalOSAI.xcodeproj
  SCHEME: VitalOSAI
  CONFIGURATION: Release
  DEFAULT_BUNDLE_ID: com.vitalos.ai
  DEFAULT_APP_STORE_CONNECT_APP_ID: "6777145740"
  ARCHIVE_PATH: build/VitalOSAI.xcarchive
  EXPORT_PATH: build/export

jobs:
  simulator-build:
    name: Simulator Build
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: |
          xcodebuild -version
          xcodebuild -showsdks

      - name: List project
        run: xcodebuild -list -project "$PROJECT_PATH"

      - name: Build for iOS Simulator
        run: |
          mkdir -p build/logs
          set +e
          set -o pipefail
          xcodebuild \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -configuration Debug \
            -destination "generic/platform=iOS Simulator" \
            CODE_SIGNING_ALLOWED=NO \
            build 2>&1 | tee build/logs/simulator-xcodebuild.log
          status=${PIPESTATUS[0]}
          set -e
          if [ "$status" -ne 0 ]; then
            diagnostic_lines=$(grep -E "error:|warning:|failed|Failure|No such|not found|cannot|Command SwiftCompile|CompileSwift" build/logs/simulator-xcodebuild.log | tail -80 || true)
            if [ -z "$diagnostic_lines" ]; then
              diagnostic_lines=$(tail -120 build/logs/simulator-xcodebuild.log)
            fi
            printf '%s\n' "$diagnostic_lines" | while IFS= read -r line; do
              safe_line=${line//'%'/'%25'}
              safe_line=${safe_line//$'\n'/'%0A'}
              safe_line=${safe_line//$'\r'/'%0D'}
              echo "::error file=.github/workflows/ios-xcode.yml,line=1::$safe_line"
            done
            exit "$status"
          fi

  archive-and-upload:
    name: Archive and Upload
    runs-on: macos-15
    needs: simulator-build
    permissions:
      contents: read
    env:
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID || secrets.TEAM_ID || secrets.DEVELOPMENT_TEAM || secrets.APP_STORE_CONNECT_TEAM_ID }}
      CERTIFICATE_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 || secrets.BUILD_CERTIFICATE_BASE64 || secrets.IOS_CERTIFICATE_BASE64 || secrets.APPLE_DISTRIBUTION_CERTIFICATE_BASE64 || secrets.APPLE_CERTIFICATE_BASE64 || secrets.APPLE_CERTIFICATE_P12_BASE64 || secrets.DISTRIBUTION_CERTIFICATE_BASE64 || secrets.DISTRIBUTION_CERTIFICATE_P12_BASE64 || secrets.CERTIFICATE_BASE64 || secrets.P12_BASE64 || secrets.IOS_P12_BASE64 || secrets.IOS_DISTRIBUTION_P12_BASE64 || secrets.APPLE_P12_BASE64 }}
      CERTIFICATE_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD || secrets.BUILD_CERTIFICATE_PASSWORD || secrets.IOS_CERTIFICATE_PASSWORD || secrets.APPLE_CERTIFICATE_PASSWORD || secrets.DISTRIBUTION_CERTIFICATE_PASSWORD || secrets.CERTIFICATE_PASSWORD || secrets.CERT_PASSWORD || secrets.P12_PASSWORD || secrets.IOS_P12_PASSWORD || secrets.APPLE_P12_PASSWORD }}
      PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 || secrets.BUILD_PROVISION_PROFILE_BASE64 || secrets.IOS_PROFILE_BASE64 || secrets.APPLE_PROVISIONING_PROFILE_BASE64 || secrets.APPLE_PROFILE_BASE64 || secrets.APPSTORE_PROVISIONING_PROFILE_BASE64 || secrets.APP_STORE_PROVISIONING_PROFILE_BASE64 || secrets.DISTRIBUTION_PROVISION_PROFILE_BASE64 || secrets.PROVISIONING_PROFILE_BASE64 || secrets.PROVISION_PROFILE_BASE64 || secrets.IOS_MOBILEPROVISION_BASE64 || secrets.MOBILEPROVISION_BASE64 }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD || 'temporary-ci-keychain-password' }}
      ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID || secrets.APP_STORE_CONNECT_API_KEY_KEY_ID || secrets.APP_STORE_CONNECT_KEY_ID || secrets.APPSTORE_API_KEY_ID || secrets.APPSTORE_KEY_ID || secrets.ASC_KEY_ID || secrets.API_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID || secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID || secrets.APP_STORE_CONNECT_ISSUER_ID || secrets.APPSTORE_API_ISSUER_ID || secrets.APPSTORE_ISSUER_ID || secrets.ASC_ISSUER_ID || secrets.API_ISSUER_ID || secrets.ISSUER_ID }}
      ASC_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 || secrets.APP_STORE_CONNECT_API_PRIVATE_KEY_BASE64 || secrets.APP_STORE_CONNECT_API_KEY_KEY_BASE64 || secrets.APP_STORE_CONNECT_API_KEY_CONTENT_BASE64 || secrets.ASC_KEY_BASE64 || secrets.ASC_PRIVATE_KEY_BASE64 || secrets.APPSTORE_API_PRIVATE_KEY_BASE64 || secrets.APPSTORE_PRIVATE_KEY_BASE64 || secrets.APPSTORE_P8_BASE64 || secrets.APP_STORE_CONNECT_PRIVATE_KEY_BASE64 || secrets.API_PRIVATE_KEY_BASE64 || secrets.API_KEY_BASE64 }}
      ASC_KEY_RAW: ${{ secrets.APP_STORE_CONNECT_API_PRIVATE_KEY || secrets.APP_STORE_CONNECT_API_KEY || secrets.APP_STORE_CONNECT_API_KEY_KEY || secrets.APP_STORE_CONNECT_API_KEY_CONTENT || secrets.ASC_PRIVATE_KEY || secrets.APPSTORE_PRIVATE_KEY || secrets.APPSTORE_P8 || secrets.APP_STORE_CONNECT_PRIVATE_KEY || secrets.API_PRIVATE_KEY }}
      BUNDLE_ID: ${{ vars.BUNDLE_ID || secrets.BUNDLE_ID || secrets.IOS_BUNDLE_ID || secrets.APP_BUNDLE_ID }}
      APP_STORE_CONNECT_APP_ID: ${{ vars.APP_STORE_CONNECT_APP_ID || secrets.APP_STORE_CONNECT_APP_ID || secrets.ASC_APP_ID || secrets.APPLE_APP_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate signing inputs
        id: signing-inputs
        run: |
          set -euo pipefail
          if [ -z "${BUNDLE_ID:-}" ]; then
            BUNDLE_ID="$DEFAULT_BUNDLE_ID"
            echo "BUNDLE_ID=$BUNDLE_ID" >> "$GITHUB_ENV"
          fi
          if [ -z "${APPLE_TEAM_ID:-}" ]; then
            echo "::error::APPLE_TEAM_ID is required for archive signing"
            exit 1
          fi

          manual_ready=true
          for name in CERTIFICATE_BASE64 CERTIFICATE_PASSWORD PROVISION_PROFILE_BASE64; do
            if [ -z "${!name:-}" ]; then
              manual_ready=false
            fi
          done

          automatic_ready=true
          for name in ASC_KEY_ID ASC_ISSUER_ID; do
            if [ -z "${!name:-}" ]; then
              automatic_ready=false
            fi
          done
          if [ -z "${ASC_KEY_BASE64:-}" ] && [ -z "${ASC_KEY_RAW:-}" ]; then
            automatic_ready=false
          fi

          if [ "$manual_ready" = true ]; then
            echo "signing_mode=manual" >> "$GITHUB_OUTPUT"
            echo "Using manual signing secrets."
          elif [ "$automatic_ready" = true ]; then
            echo "signing_mode=automatic" >> "$GITHUB_OUTPUT"
            echo "Using Xcode automatic signing with App Store Connect API key."
          else
            echo "::error::Archive signing needs either manual secrets (CERTIFICATE_BASE64, CERTIFICATE_PASSWORD, PROVISION_PROFILE_BASE64) or App Store Connect API key secrets (ASC_KEY_ID, ASC_ISSUER_ID, ASC_KEY_BASE64 or ASC_KEY_RAW)."
            exit 1
          fi

      - name: Prepare App Store Connect API key
        if: ${{ steps.signing-inputs.outputs.signing_mode == 'automatic' || github.event_name == 'push' || inputs.upload_to_testflight == 'true' }}
        run: |
          set -euo pipefail
          missing=0
          for name in ASC_KEY_ID ASC_ISSUER_ID; do
            if [ -z "${!name:-}" ]; then
              echo "::error::$name is required for automatic signing or TestFlight upload"
              missing=1
            fi
          done
          if [ -z "${ASC_KEY_BASE64:-}" ] && [ -z "${ASC_KEY_RAW:-}" ]; then
            echo "::error::ASC_KEY_BASE64 or ASC_KEY_RAW is required for automatic signing or TestFlight upload"
            missing=1
          fi
          [ "$missing" -eq 0 ]
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          key_path="$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8"
          if [ -n "${ASC_KEY_BASE64:-}" ]; then
            printf '%s' "$ASC_KEY_BASE64" | base64 --decode > "$key_path"
          else
            printf '%s' "$ASC_KEY_RAW" | perl -pe 's/\\n/\n/g' > "$key_path"
          fi
          chmod 600 "$key_path"
          echo "ASC_KEY_PATH=$key_path" >> "$GITHUB_ENV"

      - name: Resolve App Store Connect bundle ID
        if: ${{ steps.signing-inputs.outputs.signing_mode == 'automatic' || github.event_name == 'push' || inputs.upload_to_testflight == 'true' }}
        run: |
          set -euo pipefail
          if [ -n "${BUNDLE_ID:-}" ] && [ "$BUNDLE_ID" != "$DEFAULT_BUNDLE_ID" ]; then
            echo "Using configured bundle ID."
            exit 0
          fi

          export APP_STORE_CONNECT_APP_ID="${APP_STORE_CONNECT_APP_ID:-$DEFAULT_APP_STORE_CONNECT_APP_ID}"
          ruby <<'RUBY'
          require "base64"
          require "json"
          require "net/http"
          require "openssl"
          require "uri"

          def b64url(value)
            Base64.urlsafe_encode64(value).delete("=")
          end

          header = { alg: "ES256", kid: ENV.fetch("ASC_KEY_ID"), typ: "JWT" }
          payload = { iss: ENV.fetch("ASC_ISSUER_ID"), exp: Time.now.to_i + 1200, aud: "appstoreconnect-v1" }
          signing_input = [b64url(header.to_json), b64url(payload.to_json)].join(".")
          key = OpenSSL::PKey.read(File.read(ENV.fetch("ASC_KEY_PATH")))
          der_signature = key.sign(OpenSSL::Digest.new("SHA256"), signing_input)
          asn1 = OpenSSL::ASN1.decode(der_signature)
          signature = asn1.value.map { |integer| [integer.value.to_i.to_s(16).rjust(64, "0")[-64, 64]].pack("H*") }.join
          token = "#{signing_input}.#{b64url(signature)}"

          uri = URI("https://api.appstoreconnect.apple.com/v1/apps/#{ENV.fetch("APP_STORE_CONNECT_APP_ID")}")
          request = Net::HTTP::Get.new(uri)
          request["Authorization"] = "Bearer #{token}"
          request["Accept"] = "application/json"
          response = Net::HTTP.start(uri.hostname, uri.port, use_ssl: true) { |http| http.request(request) }
          unless response.code.to_i.between?(200, 299)
            warn "App Store Connect app lookup failed with HTTP #{response.code}"
            warn response.body
            exit 1
          end

          body = JSON.parse(response.body)
          bundle_id = body.dig("data", "attributes", "bundleId")
          if bundle_id.nil? || bundle_id.empty?
            warn "App Store Connect response did not include a bundleId"
            exit 1
          end

          File.open(ENV.fetch("GITHUB_ENV"), "a") { |env| env.puts("BUNDLE_ID=#{bundle_id}") }
          puts "Resolved App Store Connect bundle ID."
          RUBY

      - name: Install signing certificate and provisioning profile
        id: signing
        if: ${{ steps.signing-inputs.outputs.signing_mode == 'manual' }}
        run: |
          set -euo pipefail
          mkdir -p build/signing

          CERT_PATH="$RUNNER_TEMP/distribution.p12"
          PROFILE_PATH="$RUNNER_TEMP/profile.mobileprovision"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          printf '%s' "$CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"
          printf '%s' "$PROVISION_PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychain -d user | sed 's/"//g')
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          security cms -D -i "$PROFILE_PATH" > build/signing/profile.plist
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c 'Print :UUID' build/signing/profile.plist)
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c 'Print :Name' build/signing/profile.plist)
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"

          echo "profile_uuid=$PROFILE_UUID" >> "$GITHUB_OUTPUT"
          echo "profile_name=$PROFILE_NAME" >> "$GITHUB_OUTPUT"

      - name: Create export options
        run: |
          set -euo pipefail
          mkdir -p build
          if [ "${{ steps.signing-inputs.outputs.signing_mode }}" = "manual" ]; then
            cat > build/ExportOptions.plist <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${BUNDLE_ID}</key>
              <string>${{ steps.signing.outputs.profile_name }}</string>
            </dict>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          PLIST
          else
            cat > build/ExportOptions.plist <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          PLIST
          fi
          plutil -lint build/ExportOptions.plist

      - name: Archive
        run: |
          mkdir -p build/logs
          set +e
          set -o pipefail
          if [ "${{ steps.signing-inputs.outputs.signing_mode }}" = "manual" ]; then
            xcodebuild \
              -project "$PROJECT_PATH" \
              -scheme "$SCHEME" \
              -configuration "$CONFIGURATION" \
              -destination "generic/platform=iOS" \
              -archivePath "$ARCHIVE_PATH" \
              DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
              CODE_SIGN_STYLE=Manual \
              CODE_SIGN_IDENTITY="Apple Distribution" \
              PROVISIONING_PROFILE_SPECIFIER="${{ steps.signing.outputs.profile_name }}" \
              archive 2>&1 | tee build/logs/archive-xcodebuild.log
          else
            xcodebuild \
              -project "$PROJECT_PATH" \
              -scheme "$SCHEME" \
              -configuration "$CONFIGURATION" \
              -destination "generic/platform=iOS" \
              -archivePath "$ARCHIVE_PATH" \
              DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGN_IDENTITY="" \
              PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_ID" \
              archive 2>&1 | tee build/logs/archive-xcodebuild.log
          fi
          status=${PIPESTATUS[0]}
          set -e
          if [ "$status" -ne 0 ]; then
            diagnostic_lines=$(grep -E "error:|warning:|failed|Failure|No such|not found|cannot|Command SwiftCompile|CompileSwift" build/logs/archive-xcodebuild.log | tail -80 || true)
            if [ -z "$diagnostic_lines" ]; then
              diagnostic_lines=$(tail -120 build/logs/archive-xcodebuild.log)
            fi
            printf '%s\n' "$diagnostic_lines" | while IFS= read -r line; do
              safe_line=${line//'%'/'%25'}
              safe_line=${safe_line//$'\n'/'%0A'}
              safe_line=${safe_line//$'\r'/'%0D'}
              echo "::error file=.github/workflows/ios-xcode.yml,line=1::$safe_line"
            done
            exit "$status"
          fi

      - name: Export IPA
        run: |
          set -o pipefail
          export_args=(
            -exportArchive
            -archivePath "$ARCHIVE_PATH"
            -exportOptionsPlist build/ExportOptions.plist
            -exportPath "$EXPORT_PATH"
          )
          if [ -n "${ASC_KEY_PATH:-}" ]; then
            export_args+=(
              -allowProvisioningUpdates
              -authenticationKeyPath "$ASC_KEY_PATH"
              -authenticationKeyID "$ASC_KEY_ID"
              -authenticationKeyIssuerID "$ASC_ISSUER_ID"
            )
          fi
          xcodebuild "${export_args[@]}"
          find "$EXPORT_PATH" -name "*.ipa" -maxdepth 2 -print

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: VitalOSAI-ipa
          path: build/export/*.ipa
          if-no-files-found: error

      - name: Upload dSYM artifact
        uses: actions/upload-artifact@v4
        with:
          name: VitalOSAI-dSYMs
          path: build/*.xcarchive/dSYMs
          if-no-files-found: warn

      - name: Upload to TestFlight
        if: ${{ github.event_name == 'push' || inputs.upload_to_testflight == 'true' }}
        run: |
          set -euo pipefail
          IPA_PATH=$(find "$EXPORT_PATH" -name "*.ipa" -maxdepth 2 | head -n 1)
          if [ -z "$IPA_PATH" ]; then
            echo "::error::No IPA found to upload"
            exit 1
          fi
          xcrun altool \
            --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID"
