name: iOS Xcode

on:
  push:
    branches:
      - main
    paths:
      - "VitalOSAI/**"
      - "VitalOSAI.xcodeproj/**"
      - ".github/workflows/ios-xcode.yml"
  workflow_dispatch:
    inputs:
      upload_to_testflight:
        description: "Upload exported IPA to TestFlight"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

concurrency:
  group: ios-xcode-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PROJECT_PATH: VitalOSAI.xcodeproj
  SCHEME: VitalOSAI
  CONFIGURATION: Release
  BUNDLE_ID: com.vitalos.ai
  ARCHIVE_PATH: build/VitalOSAI.xcarchive
  EXPORT_PATH: build/export

jobs:
  simulator-build:
    name: Simulator Build
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: |
          xcodebuild -version
          xcodebuild -showsdks

      - name: List project
        run: xcodebuild -list -project "$PROJECT_PATH"

      - name: Build for iOS Simulator
        run: |
          mkdir -p build/logs
          set +e
          set -o pipefail
          xcodebuild \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -configuration Debug \
            -destination "generic/platform=iOS Simulator" \
            CODE_SIGNING_ALLOWED=NO \
            build 2>&1 | tee build/logs/simulator-xcodebuild.log
          status=${PIPESTATUS[0]}
          set -e
          if [ "$status" -ne 0 ]; then
            diagnostic_lines=$(grep -E "error:|warning:|failed|Failure|No such|not found|cannot|Command SwiftCompile|CompileSwift" build/logs/simulator-xcodebuild.log | tail -80 || true)
            if [ -z "$diagnostic_lines" ]; then
              diagnostic_lines=$(tail -120 build/logs/simulator-xcodebuild.log)
            fi
            printf '%s\n' "$diagnostic_lines" | while IFS= read -r line; do
              safe_line=${line//'%'/'%25'}
              safe_line=${safe_line//$'\n'/'%0A'}
              safe_line=${safe_line//$'\r'/'%0D'}
              echo "::error file=.github/workflows/ios-xcode.yml,line=1::$safe_line"
            done
            exit "$status"
          fi

  archive-and-upload:
    name: Archive and Upload
    runs-on: macos-15
    needs: simulator-build
    permissions:
      contents: read
    env:
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID || secrets.TEAM_ID || secrets.DEVELOPMENT_TEAM || secrets.APP_STORE_CONNECT_TEAM_ID }}
      CERTIFICATE_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 || secrets.BUILD_CERTIFICATE_BASE64 || secrets.APPLE_DISTRIBUTION_CERTIFICATE_BASE64 || secrets.APPLE_CERTIFICATE_BASE64 || secrets.DISTRIBUTION_CERTIFICATE_BASE64 || secrets.CERTIFICATE_BASE64 || secrets.P12_BASE64 || secrets.IOS_P12_BASE64 }}
      CERTIFICATE_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD || secrets.BUILD_CERTIFICATE_PASSWORD || secrets.APPLE_CERTIFICATE_PASSWORD || secrets.CERTIFICATE_PASSWORD || secrets.P12_PASSWORD || secrets.IOS_P12_PASSWORD }}
      PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 || secrets.BUILD_PROVISION_PROFILE_BASE64 || secrets.APPLE_PROVISIONING_PROFILE_BASE64 || secrets.DISTRIBUTION_PROVISION_PROFILE_BASE64 || secrets.PROVISIONING_PROFILE_BASE64 || secrets.PROVISION_PROFILE_BASE64 || secrets.IOS_MOBILEPROVISION_BASE64 || secrets.MOBILEPROVISION_BASE64 }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD || 'temporary-ci-keychain-password' }}
      ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID || secrets.ASC_KEY_ID || secrets.API_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID || secrets.ASC_ISSUER_ID || secrets.API_ISSUER_ID || secrets.ISSUER_ID }}
      ASC_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 || secrets.ASC_KEY_BASE64 || secrets.APPSTORE_API_PRIVATE_KEY_BASE64 || secrets.APP_STORE_CONNECT_PRIVATE_KEY_BASE64 || secrets.API_PRIVATE_KEY_BASE64 }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate signing secrets
        run: |
          set -euo pipefail
          missing=0
          for name in APPLE_TEAM_ID CERTIFICATE_BASE64 CERTIFICATE_PASSWORD PROVISION_PROFILE_BASE64 KEYCHAIN_PASSWORD; do
            if [ -z "${!name:-}" ]; then
              echo "::error::$name is required for archive signing"
              missing=1
            fi
          done
          exit "$missing"

      - name: Install signing certificate and provisioning profile
        id: signing
        run: |
          set -euo pipefail
          mkdir -p build/signing

          CERT_PATH="$RUNNER_TEMP/distribution.p12"
          PROFILE_PATH="$RUNNER_TEMP/profile.mobileprovision"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          printf '%s' "$CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"
          printf '%s' "$PROVISION_PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychain -d user | sed 's/"//g')
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          security cms -D -i "$PROFILE_PATH" > build/signing/profile.plist
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c 'Print :UUID' build/signing/profile.plist)
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c 'Print :Name' build/signing/profile.plist)
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"

          echo "profile_uuid=$PROFILE_UUID" >> "$GITHUB_OUTPUT"
          echo "profile_name=$PROFILE_NAME" >> "$GITHUB_OUTPUT"

      - name: Create export options
        run: |
          set -euo pipefail
          cat > build/ExportOptions.plist <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${BUNDLE_ID}</key>
              <string>${{ steps.signing.outputs.profile_name }}</string>
            </dict>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          PLIST
          plutil -lint build/ExportOptions.plist

      - name: Archive
        run: |
          mkdir -p build/logs
          set +e
          set -o pipefail
          xcodebuild \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -destination "generic/platform=iOS" \
            -archivePath "$ARCHIVE_PATH" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="${{ steps.signing.outputs.profile_name }}" \
            archive 2>&1 | tee build/logs/archive-xcodebuild.log
          status=${PIPESTATUS[0]}
          set -e
          if [ "$status" -ne 0 ]; then
            diagnostic_lines=$(grep -E "error:|warning:|failed|Failure|No such|not found|cannot|Command SwiftCompile|CompileSwift" build/logs/archive-xcodebuild.log | tail -80 || true)
            if [ -z "$diagnostic_lines" ]; then
              diagnostic_lines=$(tail -120 build/logs/archive-xcodebuild.log)
            fi
            printf '%s\n' "$diagnostic_lines" | while IFS= read -r line; do
              safe_line=${line//'%'/'%25'}
              safe_line=${safe_line//$'\n'/'%0A'}
              safe_line=${safe_line//$'\r'/'%0D'}
              echo "::error file=.github/workflows/ios-xcode.yml,line=1::$safe_line"
            done
            exit "$status"
          fi

      - name: Export IPA
        run: |
          set -o pipefail
          xcodebuild \
            -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportOptionsPlist build/ExportOptions.plist \
            -exportPath "$EXPORT_PATH"
          find "$EXPORT_PATH" -name "*.ipa" -maxdepth 2 -print

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: VitalOSAI-ipa
          path: build/export/*.ipa
          if-no-files-found: error

      - name: Upload dSYM artifact
        uses: actions/upload-artifact@v4
        with:
          name: VitalOSAI-dSYMs
          path: build/*.xcarchive/dSYMs
          if-no-files-found: warn

      - name: Prepare App Store Connect API key
        if: ${{ github.event_name == 'push' || inputs.upload_to_testflight == 'true' }}
        run: |
          set -euo pipefail
          missing=0
          for name in ASC_KEY_ID ASC_ISSUER_ID ASC_KEY_BASE64; do
            if [ -z "${!name:-}" ]; then
              echo "::error::$name is required for TestFlight upload"
              missing=1
            fi
          done
          [ "$missing" -eq 0 ]
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          printf '%s' "$ASC_KEY_BASE64" | base64 --decode > "$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8"
          chmod 600 "$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8"

      - name: Upload to TestFlight
        if: ${{ github.event_name == 'push' || inputs.upload_to_testflight == 'true' }}
        run: |
          set -euo pipefail
          IPA_PATH=$(find "$EXPORT_PATH" -name "*.ipa" -maxdepth 2 | head -n 1)
          if [ -z "$IPA_PATH" ]; then
            echo "::error::No IPA found to upload"
            exit 1
          fi
          xcrun altool \
            --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID"
